name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Build
        run: npm run build

      - name: Create source archive
        run: |
          mkdir -p release
          git archive \
            --format=tar.gz \
            --prefix="job-application-tracker-${GITHUB_REF_NAME}/" \
            --output="release/job-application-tracker-${GITHUB_REF_NAME}.tar.gz" \
            HEAD

      - name: Publish GitHub release
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "release/job-application-tracker-${GITHUB_REF_NAME}.tar.gz" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "release/job-application-tracker-${GITHUB_REF_NAME}.tar.gz" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
